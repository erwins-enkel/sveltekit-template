name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

# Uses only secrets.GITHUB_TOKEN and static config-file paths — no untrusted
# input (issue/PR/commit text) is interpolated into any `run:` step.
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
